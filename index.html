<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neeraj CG | Sound Designer & Mixer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --deep-purple: #1a0b2e;
            --accent-purple: #7c3aed;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #d1d1d1;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .heading-font { font-family: 'Outfit', sans-serif; }

        /* Smooth Scroll Reveal */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.22, 1, 0.36, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* PAGE 4: Panning & Zooming Background (Photo 15) */
        @keyframes panZoom {
            0% { transform: scale(1.2) translateX(0%); }
            50% { transform: scale(1.3) translateX(-8%); }
            100% { transform: scale(1.2) translateX(0%); }
        }
        .panning-bg {
            position: absolute;
            top: 0; left: 0;
            width: 110%; height: 110%;
            object-fit: cover;
            animation: panZoom 25s ease-in-out infinite;
            filter: brightness(0.4);
            z-index: 0;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(124, 58, 237, 0.1);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-5px);
            background: rgba(124, 58, 237, 0.05);
        }

        /* Hover Effects for Photos */
        .photo-hover { overflow: hidden; border-radius: 8px; }
        .photo-hover img { transition: transform 0.8s ease; }
        .photo-hover:hover img { transform: scale(1.1); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--deep-purple); border-radius: 10px; }
    </style>
</head>
<body>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 relative overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-900/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-900/10 blur-[100px] rounded-full"></div>

        <div class="reveal active">
            <div class="relative inline-block mb-8">
                <div class="absolute inset-0 bg-purple-600 blur-3xl opacity-20 rounded-full animate-pulse"></div>
                <img src="photo1.jpg" alt="Neeraj CG" class="relative w-48 h-48 md:w-56 md:h-56 rounded-full object-cover border-2 border-purple-500/30">
            </div>
            <h1 class="text-6xl md:text-8xl font-800 text-white tracking-tighter mb-2">NEERAJ CG</h1>
            <p class="text-purple-400 font-light tracking-[0.4em] uppercase text-sm md:text-base mb-6">Re-recording Mixer | Sound Designer</p>
            <p class="text-gray-500 uppercase tracking-widest text-xs mb-10">Indian Film Industry</p>

            <div class="flex flex-wrap justify-center gap-6 text-[10px] tracking-[0.3em] text-gray-400 mb-12 uppercase">
                <span>Film</span> <span class="text-purple-900">|</span> <span>Television</span> <span class="text-purple-900">|</span>
